apiVersion: v1
kind: Namespace
metadata:
  name: deployment-probe
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-probe
  namespace: deployment-probe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controller-probe
  template:
    metadata:
      labels:
        app: controller-probe
    spec:
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
