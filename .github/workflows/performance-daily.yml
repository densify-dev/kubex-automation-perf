name: performance-daily

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      workloads:
        description: "Number of workloads to create"
        required: true
        default: "32010"
      nodes:
        description: "Number of KWOK nodes"
        required: true
        default: "1000"
      chart_version:
        description: "Helm chart version to test"
        required: true
        default: "latest"

concurrency:
  group: performance-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    continue-on-error: ${{ matrix.controller_install_order == 'after-workload-ramp' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - controller_install_order: before-workload-ramp
            workloads: 32010
            deployments: 15000
            statefulsets: 15000
            cronjobs: 2000
            daemonsets: 10
            nodes: 1000
          - controller_install_order: after-workload-ramp
            workloads: 32010
            deployments: 15000
            statefulsets: 15000
            cronjobs: 2000
            daemonsets: 10
            nodes: 1000
    env:
      WORKLOADS: ${{ matrix.workloads }}
      NODES: ${{ matrix.nodes }}
      CHART_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.chart_version || 'latest' }}
      CLUSTER_NAME: performance-daily
      KUBEX_CLUSTER_NAME: ${{ secrets.KUBEX_CLUSTER_NAME }}
      KUBEX_URL_HOST: ${{ secrets.KUBEX_URL_HOST }}
      KUBEX_USERNAME: ${{ secrets.KUBEX_USERNAME }}
      KUBEX_EPASSWORD: ${{ secrets.KUBEX_EPASSWORD }}
      RELEASE_NAME: kubex-automation-engine
      RELEASE_NAMESPACE: kubex
      KWOK_VERSION: v0.5.1
      METRICS_PORT_FORWARD: "18080"
      SCENARIO_DIR: artifacts/scenario
      METRICS_DIR: artifacts/metrics
      FINAL_DIR: artifacts/final
      DIAGNOSTICS_DIR: artifacts/diagnostics
      REPORT_DIR: artifacts/report
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare artifact directories
        run: |
          mkdir -p artifacts/scenario artifacts/metrics artifacts/final artifacts/diagnostics artifacts/report

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Install kwokctl
        uses: kubernetes-sigs/kwok@main
        with:
          command: kwokctl
          kwok-version: ${{ env.KWOK_VERSION }}

      - name: Download KWOK metrics usage config
        run: |
          curl -fsSL -o metrics-usage.yaml \
            https://github.com/kubernetes-sigs/kwok/releases/download/${KWOK_VERSION}/metrics-usage.yaml

      - name: Create kind KWOK cluster
        env:
          KWOK_KUBE_VERSION: v1.30.0
        run: |
          kwokctl create cluster \
            --runtime kind \
            --name "${CLUSTER_NAME}" \
            --enable-metrics-server \
            -c metrics-usage.yaml
          kwokctl get kubeconfig --name "${CLUSTER_NAME}" > kwok.kubeconfig
          echo "KUBECONFIG=${PWD}/kwok.kubeconfig" >> "$GITHUB_ENV"

      - name: Ramp KWOK nodes before controller install
        run: |
          kwokctl scale node --name "${CLUSTER_NAME}" --replicas "${NODES}"
          kubectl --kubeconfig kwok.kubeconfig wait --for=condition=Ready node --all --timeout=10m

      - name: Uncordon kind control-plane
        run: |
          kubectl get nodes -o wide
          control_plane_nodes=$(python3 -c 'import json, subprocess; data=json.loads(subprocess.check_output(["kubectl", "get", "nodes", "-o", "json"], text=True)); names=[item["metadata"]["name"] for item in data.get("items", []) if "node-role.kubernetes.io/control-plane" in item.get("metadata", {}).get("labels", {}) or "node-role.kubernetes.io/master" in item.get("metadata", {}).get("labels", {})]; print("\n".join(names))')
          printf '%s\n' "$control_plane_nodes" | xargs -r kubectl uncordon
          printf '%s\n' "$control_plane_nodes" | xargs -r kubectl get node -o wide

      - name: Probe deployment controller
        run: |
          kubectl apply -f manifests/deployment-controller-probe.yaml
          if ! kubectl wait --for=condition=Available deployment/controller-probe -n deployment-probe --timeout=90s; then
            kubectl get deploy,rs,pod -n deployment-probe -o wide
            kubectl describe deployment/controller-probe -n deployment-probe
            exit 1
          fi
          kubectl delete namespace deployment-probe --wait=false

      - name: Generate scenario manifests
        run: |
          python3 scripts/build_scenario.py \
            --output-dir "${SCENARIO_DIR}" \
            --workloads "${WORKLOADS}" \
            --nodes "${NODES}" \
            --deployments "${{ matrix.deployments }}" \
            --statefulsets "${{ matrix.statefulsets }}" \
            --cronjobs "${{ matrix.cronjobs }}" \
            --daemonsets "${{ matrix.daemonsets }}" \
            --controller-install-order "${{ matrix.controller_install_order }}" \
            --cluster-name "${CLUSTER_NAME}" \
            --kubex-host "${KUBEX_URL_HOST}" \
            --kubex-cluster-name "${KUBEX_CLUSTER_NAME}" \
            --release-name "${RELEASE_NAME}" \
            --release-namespace "${RELEASE_NAMESPACE}"

      - name: Install Kubex CRDs
        run: |
          helm repo add kubex https://densify-dev.github.io/helm-charts
          helm repo update
          helm upgrade --install kubex-crds kubex/kubex-crds \
            --namespace "${RELEASE_NAMESPACE}" \
            --create-namespace

      - name: Probe kubex namespace deployment controller
        run: |
          kubectl apply -f manifests/kubex-deployment-probe.yaml
          if ! kubectl wait --for=condition=Available deployment/kubex-deployment-probe -n kubex --timeout=90s; then
            kubectl get deploy,rs,pod -n kubex -o wide
            kubectl describe deployment/kubex-deployment-probe -n kubex
            exit 1
          fi
          kubectl delete deployment kubex-deployment-probe -n kubex --wait=false

      - name: Apply workloads before controller install
        if: matrix.controller_install_order == 'after-workload-ramp'
        run: |
          kubectl apply -f "${SCENARIO_DIR}/namespaces.yaml"
          for file in "${SCENARIO_DIR}"/workloads/*.yaml; do
            kubectl apply -f "$file"
          done

      - name: Install automation engine before workloads
        if: matrix.controller_install_order == 'before-workload-ramp'
        run: |
          version_args=()
          if [ -n "${CHART_VERSION}" ] && [ "${CHART_VERSION}" != "latest" ]; then
            version_args+=(--version "${CHART_VERSION}")
          fi
          helm upgrade --install "${RELEASE_NAME}" kubex/kubex-automation-engine \
            --namespace "${RELEASE_NAMESPACE}" \
            --create-namespace \
            "${version_args[@]}" \
            --set-string kubexCredentials.username="${KUBEX_USERNAME}" \
            --set-string kubexCredentials.epassword="${KUBEX_EPASSWORD}" \
            -f "${SCENARIO_DIR}/install-values.yaml"
          kubectl -n "${RELEASE_NAMESPACE}" patch deployment "${RELEASE_NAME}" --type=json -p='[
            {"op":"add","path":"/spec/template/spec/hostNetwork","value":true},
            {"op":"add","path":"/spec/template/spec/dnsPolicy","value":"ClusterFirstWithHostNet"}
          ]'

      - name: Wait for controller health before workloads
        if: matrix.controller_install_order == 'before-workload-ramp'
        run: |
          python3 scripts/kwok_orchestrate.py wait-controller-health \
            --namespace "${RELEASE_NAMESPACE}" \
            --release "${RELEASE_NAME}" \
            --timeout 3m

      - name: Apply workloads after controller install
        if: matrix.controller_install_order == 'before-workload-ramp'
        run: |
          kubectl apply -f "${SCENARIO_DIR}/namespaces.yaml"
          for file in "${SCENARIO_DIR}"/workloads/*.yaml; do
            kubectl apply -f "$file"
          done

      - name: Install automation engine after workloads
        if: matrix.controller_install_order == 'after-workload-ramp'
        run: |
          version_args=()
          if [ -n "${CHART_VERSION}" ] && [ "${CHART_VERSION}" != "latest" ]; then
            version_args+=(--version "${CHART_VERSION}")
          fi
          helm upgrade --install "${RELEASE_NAME}" kubex/kubex-automation-engine \
            --namespace "${RELEASE_NAMESPACE}" \
            --create-namespace \
            "${version_args[@]}" \
            --set-string kubexCredentials.username="${KUBEX_USERNAME}" \
            --set-string kubexCredentials.epassword="${KUBEX_EPASSWORD}" \
            -f "${SCENARIO_DIR}/install-values.yaml"
          kubectl -n "${RELEASE_NAMESPACE}" patch deployment "${RELEASE_NAME}" --type=json -p='[
            {"op":"add","path":"/spec/template/spec/hostNetwork","value":true},
            {"op":"add","path":"/spec/template/spec/dnsPolicy","value":"ClusterFirstWithHostNet"}
          ]'

      - name: Wait for controller health after workloads
        if: matrix.controller_install_order == 'after-workload-ramp'
        run: |
          python3 scripts/kwok_orchestrate.py wait-controller-health \
            --namespace "${RELEASE_NAMESPACE}" \
            --release "${RELEASE_NAME}" \
            --timeout 20m

      - name: Collect controller diagnostics on failure
        if: failure() && matrix.controller_install_order == 'after-workload-ramp'
        run: |
          mkdir -p "${DIAGNOSTICS_DIR}"
          save_log() {
            local path="$1"
            shift
            "$@" > "$path" 2>&1 || true
          }
          save_log "${DIAGNOSTICS_DIR}/kubex-controller-pods.txt" kubectl get pod -n "${RELEASE_NAMESPACE}" -l control-plane=controller-manager -o wide
          save_log "${DIAGNOSTICS_DIR}/kubex-controller-deploy-rs-pod.txt" kubectl get deploy,rs,pod -n "${RELEASE_NAMESPACE}" -o wide
          save_log "${DIAGNOSTICS_DIR}/kubex-controller-deployment-describe.txt" kubectl describe deployment "${RELEASE_NAME}" -n "${RELEASE_NAMESPACE}"
          save_log "${DIAGNOSTICS_DIR}/kubex-controller-describe.txt" kubectl describe pod -n "${RELEASE_NAMESPACE}" -l control-plane=controller-manager
          save_log "${DIAGNOSTICS_DIR}/kubex-controller-logs-previous.txt" kubectl logs -n "${RELEASE_NAMESPACE}" -l control-plane=controller-manager -c manager --since=30m --previous
          save_log "${DIAGNOSTICS_DIR}/kubex-controller-logs-current.txt" kubectl logs -n "${RELEASE_NAMESPACE}" -l control-plane=controller-manager -c manager --since=30m
          save_log "${DIAGNOSTICS_DIR}/kubex-events.txt" kubectl get events -A --sort-by=.lastTimestamp
          save_log "${DIAGNOSTICS_DIR}/kube-system-controller-manager.log" kubectl logs -n kube-system kube-controller-manager-kwok-${CLUSTER_NAME}-control-plane --since=30m
          save_log "${DIAGNOSTICS_DIR}/kube-system-scheduler.log" kubectl logs -n kube-system kube-scheduler-kwok-${CLUSTER_NAME}-control-plane --since=30m
          save_log "${DIAGNOSTICS_DIR}/kube-system-apiserver.log" kubectl logs -n kube-system kube-apiserver-kwok-${CLUSTER_NAME}-control-plane --since=30m
          save_log "${DIAGNOSTICS_DIR}/kube-system-etcd.log" kubectl logs -n kube-system etcd-kwok-${CLUSTER_NAME}-control-plane --since=30m

      - name: Wait for workload counts
        run: |
          python3 scripts/kwok_orchestrate.py wait-count \
            --resource deployments.apps,statefulsets.apps,cronjobs.batch,daemonsets.apps \
            --selector "app.kubernetes.io/name=kwok-perf" \
            --expected "${WORKLOADS}" \
            --timeout 30m

      - name: Start metrics collector
        run: |
          mkdir -p "${METRICS_DIR}" "${FINAL_DIR}" "${REPORT_DIR}"
          nohup bash scripts/collect_metrics.sh \
            --namespace "${RELEASE_NAMESPACE}" \
            --release "${RELEASE_NAME}" \
            --port-forward-port "${METRICS_PORT_FORWARD}" \
            --output-dir "${METRICS_DIR}" \
            --stop-file "${METRICS_DIR}/stop" \
            --interval 15 \
            > "${METRICS_DIR}/collector.log" 2>&1 &
          echo $! > "${METRICS_DIR}/collector.pid"

      - name: Apply automation resources
        run: |
          kubectl apply -f "${SCENARIO_DIR}/strategy.yaml"
          kubectl apply -f "${SCENARIO_DIR}/policy.yaml"

      - name: Soak
        run: |
          sleep 900

      - name: Stop metrics collector
        if: always()
        run: |
          touch "${METRICS_DIR}/stop"
          if [ -f "${METRICS_DIR}/collector.pid" ]; then
            pid=$(cat "${METRICS_DIR}/collector.pid")
            for _ in $(seq 1 30); do
              if ! kill -0 "$pid" 2>/dev/null; then
                exit 0
              fi
              sleep 2
            done
            kill "$pid" 2>/dev/null || true
          fi

      - name: Collect final state
        if: always()
        run: |
          bash scripts/collect_final_state.sh \
            --namespace "${RELEASE_NAMESPACE}" \
            --release "${RELEASE_NAME}" \
            --output-dir "${FINAL_DIR}"

      - name: Summarize results
        if: always()
        run: |
          python3 scripts/summarize_metrics.py \
            --metadata "${SCENARIO_DIR}/metadata.json" \
            --metrics-dir "${METRICS_DIR}" \
            --final-dir "${FINAL_DIR}" \
            --output-dir "${REPORT_DIR}"
          cat "${REPORT_DIR}/summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish gh-pages history
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          JOB_STATUS: ${{ job.status }}
        run: |
          bash -lc '
            set -euo pipefail
            repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            for attempt in 1 2 3 4 5; do
              workdir=$(mktemp -d)
              if git ls-remote --exit-code --heads "$repo_url" gh-pages >/dev/null 2>&1; then
                git clone --depth 1 --branch gh-pages "$repo_url" "$workdir/gh-pages"
              else
                mkdir -p "$workdir/gh-pages"
                git -C "$workdir/gh-pages" init -b gh-pages
                git -C "$workdir/gh-pages" remote add origin "$repo_url"
              fi
              python3 scripts/publish_history.py \
                --summary-json "${REPORT_DIR}/summary.json" \
                --pages-dir "$workdir/gh-pages" \
                --repository "${GITHUB_REPOSITORY}" \
                --run-id "${GITHUB_RUN_ID}" \
                --run-number "${GITHUB_RUN_NUMBER}" \
                --run-attempt "${GITHUB_RUN_ATTEMPT}" \
                --sha "${GITHUB_SHA}" \
                --ref-name "${GITHUB_REF_NAME}" \
                --status "${JOB_STATUS}"
              git -C "$workdir/gh-pages" config user.name "github-actions[bot]"
              git -C "$workdir/gh-pages" config user.email "github-actions[bot]@users.noreply.github.com"
              git -C "$workdir/gh-pages" add history.json index.html latest.json runs
              if git -C "$workdir/gh-pages" diff --cached --quiet; then
                exit 0
              fi
              git -C "$workdir/gh-pages" commit -m "Update KWOK perf history for ${GITHUB_RUN_ID}"
              if git -C "$workdir/gh-pages" push origin gh-pages; then
                exit 0
              fi
              sleep "$attempt"
            done
            exit 1
          '

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-daily-${{ github.run_id }}-${{ matrix.controller_install_order }}
          path: |
            artifacts/scenario
            artifacts/metrics
            artifacts/final
            artifacts/diagnostics
            artifacts/report
          if-no-files-found: warn
          retention-days: 30
